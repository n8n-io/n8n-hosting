apiVersion: apps/v1
kind: Deployment
metadata:
  name: instance-monitoring
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: instance-monitoring
  template:
    metadata:
      labels:
        app: instance-monitoring
    spec:
      containers:
        - name: instance-monitoring
          image: instance-monitoring:local
          imagePullPolicy: Never
          ports:
            - name: dashboard
              containerPort: 5701
          env:
            - name: DB_PATH
              value: /data/monitoring.db
            - name: N8N_INSTANCES
              value: '[{"id":"axolotl","url":"http://n8n-main.n8n-1.svc.cluster.local:5678"},{"id":"narwhal","url":"http://n8n-main.n8n-2.svc.cluster.local:5678"},{"id":"dolphin","url":"http://n8n-main.n8n-3.svc.cluster.local:5678"}]'
            - name: TOKEN_EXCHANGE_PRIVATE_KEY_PATH
              value: /keys/private.pem
            - name: TOKEN_EXCHANGE_KID
              value: instance-monitoring-key
            - name: TOKEN_EXCHANGE_ISSUER
              value: https://instance-monitoring.local
            - name: TOKEN_EXCHANGE_AUDIENCE
              value: n8n
            - name: POLL_INTERVAL_SECONDS
              value: "90"
          volumeMounts:
            - name: data
              mountPath: /data
            - name: token-exchange-key
              mountPath: /keys
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /dashboard
              port: 5701
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: instance-monitoring-data
        - name: token-exchange-key
          secret:
            secretName: token-exchange-private-key
            items:
              - key: private.pem
                path: private.pem
