AWSTemplateFormatVersion: '2010-09-09'
Description: Deploys n8n with multi-main and queue mode configured. s3 is used for storage. 

Parameters:

# n8n host parameters

  N8nHostedZone:
    Type: AWS::Route53::HostedZone::Id
    Description: "Selected the hosted zone you would like to use to access n8n. https://docs.n8n.io/hosting/configuration/environment-variables/deployment/"
    AllowedPattern: "Z.+"
    ConstraintDescription: "You must selected a hosted zone in order to continue"

  N8nHostRecordName:
    Type: String
    Description: "Enter the host name that matches the hosted zone you selected. Must match Cert ARN."
    AllowedPattern: ".+"
    ConstraintDescription: "Please enter a host record name to continue."
    Default: "ENTER-YOUR-HOST-RECORD-HERE"
  
  N8nCertArn:
    Type: String
    Description: "Copy paste the ARN of the security certificate associated with your hosted zone. MUST BE IN SAME REGION AS STACK!"
    Default: "ENTER-YOUR-CERT-ARN-HERE"

# vpc/network configuration

  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the VPC.

  PrivateSubnet1Cidr:
    Type: String
    Default: 10.0.1.0/24
    Description: CIDR block for private subnet 1.

  PrivateSubnet2Cidr:
    Type: String
    Default: 10.0.2.0/24
    Description: CIDR block for private subnet 2.

  PrivateSubnet3Cidr:
    Type: String
    Default: 10.0.3.0/24
    Description: CIDR block for private subnet 3.

  

# postgres parameters
  DBInstanceClass:
    Type: String
    Description: >-
      PostgreSQL instance class. Sizing guidance (the DB becomes the bottleneck before the
      worker/webhook tiers as request rate rises): db.t4g.micro/small/medium are BURSTABLE
      (CPU-credit limited) and fine for dev / light / bursty load but throttle under sustained
      load. For sustained throughput pick a non-burstable class, db.m7g.large for ~250 req/s,
      db.m7g.xlarge/2xlarge for higher rps or heavier workflows. Past a single instance's
      ceiling (~hundreds of req/s) the path is Aurora PostgreSQL I/O-Optimized + PgBouncer,
      which is beyond this template.
    Default: db.t4g.small
    AllowedValues: 
      - db.t4g.micro
      - db.t4g.small
      - db.t4g.medium
      - db.m7g.large
      - db.m7g.xlarge
      - db.m7g.2xlarge
  DBAllocatedStorage:
    Type: Number
    Default: 20
    MinValue: 20
    Description: Storage in GiB (minimum for RDS is typically 20 GiB)
  MasterUsername:
    Type: String
    Default: postgres
    Description: Master (admin) username
    AllowedPattern: '^[a-zA-Z][a-zA-Z0-9_]{0,15}$'
  MasterUserPassword:
    Type: String
    NoEcho: true
    Description: "Master (admin) password. IMPORTANT: required parameter, choose a strong, unique value."
    MinLength: 8
  DBName:
    Type: String
    Default: n8n
    Description: Initial database to create
    AllowedPattern: '^[a-zA-Z][a-zA-Z0-9_]{0,62}$'

# redis parameters
  RedisInstanceClass:
    Type: String
    Description: "Select instance class for n8n's Redis cache"
    Default: cache.t4g.small
    AllowedValues:
      - cache.t4g.micro
      - cache.t4g.small
      - cache.t4g.medium
      - cache.m4.large
      - cache.m4.xlarge
      - cache.m4.2xlarge
  RedisPassword:
    Type: String
    NoEcho: true
    Description: "Password for the Redis user 'default'. Must be 16 characters at least. IMPORTANT: required parameter, choose a strong, unique value."
    AllowedPattern: ".{16}.*"
  RedisReplicasPerNodeGroup:
    Type: Number
    Default: 1
    MinValue: 0
    MaxValue: 5
    Description: "Redis read replicas per shard. >=1 enables Multi-AZ + automatic failover (HA, recommended for prod). Set 0 for a single-node dev cache (SPOF, cheaper)."

# license key parameters
  N8nLicenseKey:
    Type: String
    Description: "Enter your n8n enterprise license key."
    Default: 12345678-0987-1234-5678-123456789012
    AllowedPattern: '^[a-z0-9]{8}-[a-z0-9]{4}-[a-z0-9]{4}-[a-z0-9]{4}-[a-z0-9]{12}$'
             
  N8nTenantId:
    Type: String
    Description: "[Embed only] Enter your n8n tenant ID. Leave as default for a standard install."
    Default: 1
    AllowedPattern: '^[0-9]+$'

# worker autoscaling parameters (queue-depth driven, tuneable)
  WorkerMinTasks:
    Type: Number
    Default: 2
    MinValue: 1
    Description: "Minimum worker tasks (autoscaling floor, kept running even when the queue is empty)."
  WorkerMaxTasks:
    Type: Number
    Default: 10
    MinValue: 1
    Description: "Maximum worker tasks the queue-depth autoscaler may scale out to."
  WorkerBacklogPerTask:
    Type: Number
    Default: 20
    MinValue: 1
    Description: "Scale target: AWS keeps roughly this many waiting jobs per worker (analog of the EKS module's jobs_per_replica). Lower = more aggressive."
  WorkerConcurrency:
    Type: Number
    Default: 10
    MinValue: 1
    Description: "Jobs each worker processes in parallel (n8n N8N_CONCURRENCY)."

# webhook autoscaling parameters (request-rate driven, tuneable)
  WebhookMinTasks:
    Type: Number
    Default: 4
    MinValue: 1
    Description: "Minimum webhook tasks (floor). Defaulted to 4 so the ingestion tier absorbs bursts during the ~3-5 min scale-out lag instead of throttling on cold start."
  WebhookMaxTasks:
    Type: Number
    Default: 10
    MinValue: 1
    Description: "Maximum webhook tasks the autoscaler may scale to."
  WebhookRequestsPerTask:
    Type: Number
    Default: 1000
    MinValue: 1
    Description: "Scale target: average ALB requests per webhook task (ALBRequestCountPerTarget). Lower = more aggressive / lower latency, higher = cheaper."

# execution-data retention (pruning) parameters, matched to the EKS module's Medium tier
  ExecutionsDataMaxAge:
    Type: Number
    Default: 168
    MinValue: 1
    Description: "Max age (hours) of execution records to retain before pruning. EKS Medium = 168 (7 days). Maps to EXECUTIONS_DATA_MAX_AGE."
  ExecutionsDataMaxCount:
    Type: Number
    Default: 500000
    MinValue: 0
    Description: "Max number of execution records to retain (0 = no count limit). EKS Medium = 500000. Maps to EXECUTIONS_DATA_PRUNE_MAX_COUNT."
  ConcurrencyProductionLimit:
    Type: Number
    Default: 200
    MinValue: -1
    Description: "Max concurrent production executions (-1 to disable). EKS Medium = 200. Maps to N8N_CONCURRENCY_PRODUCTION_LIMIT."

# task runner parameters
  EnablePythonTaskRunner:
    Type: String
    Default: "false"
    AllowedValues: [ "true", "false" ]
    Description: "BETA. true = run an external n8nio/runners sidecar (JavaScript + native Python) on the main and worker tasks for Python Code node support, matching the EKS module. false (default) = JS-only internal runner, no sidecar, no extra cost. Validate with a test deploy before relying on it."
  PythonStdlibAllow:
    Type: String
    Default: ""
    Description: "Only used when EnablePythonTaskRunner=true. Python stdlib modules the runner may import (maps to N8N_RUNNERS_STDLIB_ALLOW). Comma-separated (e.g. json,math,datetime) or * for all. Empty (default) = no imports allowed (most secure; matches n8n default)."
  PythonExternalAllow:
    Type: String
    Default: ""
    Description: "Only used when EnablePythonTaskRunner=true. External (pip) packages the runner may import (maps to N8N_RUNNERS_EXTERNAL_ALLOW). Comma-separated or * for all. Empty (default) = none."

# labels to make everything easier to read during setup
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "n8n License Config"
        Parameters:
          - N8nLicenseKey
          - N8nTenantId
      - Label:
          default: "DNS Config"
        Parameters:
           - N8nHostedZone
           - N8nCertArn
           - N8nHostRecordName
      - Label:
          default: "VPC & Network Config"
        Parameters:
          - VpcCidr
          - PrivateSubnet1Cidr
          - PrivateSubnet2Cidr
          - PrivateSubnet3Cidr
      - Label:
          default: "Postgres DB Config"
        Parameters:
          - DBInstanceClass
          - MasterUsername
          - MasterUserPassword
          - DBAllocatedStorage
          - DBName
      - Label:
          default: "Redis Config"
        Parameters:
          - RedisInstanceClass
          - RedisPassword
      - Label:
          default: "Worker Autoscaling Config"
        Parameters:
          - WorkerMinTasks
          - WorkerMaxTasks
          - WorkerBacklogPerTask
          - WorkerConcurrency
      - Label:
          default: "Webhook Autoscaling Config"
        Parameters:
          - WebhookMinTasks
          - WebhookMaxTasks
          - WebhookRequestsPerTask
      - Label:
          default: "Redis HA Config"
        Parameters:
          - RedisReplicasPerNodeGroup
      - Label:
          default: "Data Retention Config"
        Parameters:
          - ExecutionsDataMaxAge
          - ExecutionsDataMaxCount
          - ConcurrencyProductionLimit
      - Label:
          default: "Task Runner Config"
        Parameters:
          - EnablePythonTaskRunner
          - PythonStdlibAllow
          - PythonExternalAllow

Conditions:
  # >=1 replica enables Multi-AZ + automatic failover
  RedisHA: !Not [ !Equals [ !Ref RedisReplicasPerNodeGroup, 0 ] ]
  # opt-in external task runner sidecar (JS + native Python)
  PythonRunner: !Equals [ !Ref EnablePythonTaskRunner, "true" ]

Resources:

  # create n8n license secret
  N8nLicenseSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${AWS::StackName}-app-user/n8nlicense"
      Description: Access keys for app-user created by CloudFormation
      SecretString: !Sub |
        {
          "LicenseKey": "${N8nLicenseKey}",
          "TenantId": "${N8nTenantId}"
        }

  # create encryption key secret        
  N8nEncryptionKey:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${AWS::StackName}-app-user/encryptionkey"
      Description: Encryption key for queue mode
      SecretString: !Select
        - 2
        - !Split
          - "/"
          - !Ref AWS::StackId

  # create VPC just for n8n
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-vpc"

  # Internet Gateway (created and attached to the VPC; not routed to by private subnets)
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-igw"

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # Subnets (first 3 AZs in the chosen region)
  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnet1Cidr
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-private-1"

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnet2Cidr
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-private-2"

  PrivateSubnet3:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnet3Cidr
      AvailabilityZone: !Select [2, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-private-3"

  # Public subnets, first two in chosen region  
  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.10.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-public-1"

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.11.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-public-2"

  # route table for  allowing public access
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-public-rt"

  PublicDefaultRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable
  
  # Public NAT gateways, one per public subnet/AZ
  NatEipAz1:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  NatGatewayAz1:
    Type: AWS::EC2::NatGateway
    DependsOn: VPCGatewayAttachment
    Properties:
      AllocationId: !GetAtt NatEipAz1.AllocationId
      SubnetId: !Ref PublicSubnet1
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-nat-az1"
  
  NatEipAz2:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  NatGatewayAz2:
    Type: AWS::EC2::NatGateway
    DependsOn: VPCGatewayAttachment
    Properties:
      AllocationId: !GetAtt NatEipAz2.AllocationId
      SubnetId: !Ref PublicSubnet2
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-nat-az2"

  # private route tables configured per AZ

  PrivateRouteTableAz1:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-private-rt-az1"

  PrivateDefaultRouteViaNatAz1:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTableAz1
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGatewayAz1

  PrivateRouteTableAz2:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-private-rt-az2"

  PrivateDefaultRouteViaNatAz2:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTableAz2
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGatewayAz2

  PrivateSubnet1Association:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTableAz1

  PrivateSubnet2Association:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTableAz2

  PrivateSubnet3Association:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet3
      RouteTableId: !Ref PrivateRouteTableAz1
  
  # Security group for 443, 80, 5678 access over HTTPS
  ALBSecGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: default VPC security group
      VpcId: !Ref VPC
      GroupName: !Sub "${AWS::StackName}-alb-sg"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0

  # separate egress rules to prevent circular reference 
  ALBTaskEgress:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref ALBSecGroup
      IpProtocol: tcp
      FromPort: 5678
      ToPort: 5678
      DestinationSecurityGroupId: !Ref TaskSecGroupMain
    
  # Load balancer for reaching mains
  ElasticLoadBalancingV2LoadBalancer:
    Type: "AWS::ElasticLoadBalancingV2::LoadBalancer"
    Properties:
        Name: !Sub "${AWS::StackName}-alb"
        Scheme: "internet-facing"
        Type: "application"
        Subnets: 
          - !Ref PublicSubnet1
          - !Ref PublicSubnet2
        SecurityGroups: 
          - !Ref ALBSecGroup
        IpAddressType: "ipv4"
        LoadBalancerAttributes: 
          - 
            Key: "access_logs.s3.enabled"
            Value: "false"
          - 
            Key: "idle_timeout.timeout_seconds"
            Value: "60"
          - 
            Key: "deletion_protection.enabled"
            Value: "false"
          - 
            Key: "routing.http2.enabled"
            Value: "true"
          - 
            Key: "routing.http.drop_invalid_header_fields.enabled"
            Value: "false"
          - 
            Key: "routing.http.xff_client_port.enabled"
            Value: "false"
          - 
            Key: "routing.http.preserve_host_header.enabled"
            Value: "false"
          - 
            Key: "routing.http.xff_header_processing.mode"
            Value: "append"
          - 
            Key: "load_balancing.cross_zone.enabled"
            Value: "true"
          - 
            Key: "routing.http.desync_mitigation_mode"
            Value: "defensive"
          - 
            Key: "client_keep_alive.seconds"
            Value: "3600"
          - 
            Key: "waf.fail_open.enabled"
            Value: "false"
          - 
            Key: "routing.http.x_amzn_tls_version_and_cipher_suite.enabled"
            Value: "false"
          - 
            Key: "zonal_shift.config.enabled"
            Value: "false"
          - 
            Key: "connection_logs.s3.enabled"
            Value: "false"

  # ALB target groups
  HttpAppTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${AWS::StackName}-alb-tg"
      VpcId: !Ref VPC
      Protocol: HTTP
      Port: 5678
      TargetType: ip
      IpAddressType: ipv4
      ProtocolVersion: HTTP1
      HealthCheckEnabled: true
      HealthCheckProtocol: HTTP
      HealthCheckPort: 5678
      HealthCheckIntervalSeconds: 60
      HealthCheckTimeoutSeconds: 30
      HealthyThresholdCount: 8
      UnhealthyThresholdCount: 5
      # readiness (DB + Redis), not shallow liveness, so the ALB only routes to fully-ready tasks
      HealthCheckPath: /healthz/readiness
      Matcher:
        HttpCode: '200'
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: "30"
        - Key: slow_start.duration_seconds
          Value: "30"

  # target group for the dedicated webhook service (webhook process serves /healthz, not /)
  WebhookTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${AWS::StackName}-wh-tg"
      VpcId: !Ref VPC
      Protocol: HTTP
      Port: 5678
      TargetType: ip
      IpAddressType: ipv4
      ProtocolVersion: HTTP1
      HealthCheckEnabled: true
      HealthCheckProtocol: HTTP
      HealthCheckPort: 5678
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 10
      HealthyThresholdCount: 3
      UnhealthyThresholdCount: 5
      # match the webhook container health check (/healthz); the webhook process serves
      # /healthz reliably, so gating targets on it avoids all-webhook 503s on startup
      HealthCheckPath: /healthz
      Matcher:
        HttpCode: '200'
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: "30"
        - Key: slow_start.duration_seconds
          Value: "30"

  # Listeners
  ElasticLoadBalancingV2Listener2:
    Type: "AWS::ElasticLoadBalancingV2::Listener"
    Properties:
        LoadBalancerArn: !Ref ElasticLoadBalancingV2LoadBalancer
        Port: 443
        Protocol: "HTTPS"
        Certificates:
          - CertificateArn: !Ref N8nCertArn
        DefaultActions: 
          - 
            Order: 1
            TargetGroupArn: !Ref HttpAppTargetGroup
            Type: "forward"

  ElasticLoadBalancingV2Listener3:
    Type: "AWS::ElasticLoadBalancingV2::Listener"
    Properties:
        LoadBalancerArn: !Ref ElasticLoadBalancingV2LoadBalancer
        Port: 80
        Protocol: "HTTP"
        DefaultActions: 
          - 
            Order: 1
            Type: "redirect"
            RedirectConfig:
              Protocol: HTTPS
              Port: 443
              StatusCode: HTTP_301

  # route production webhook + form paths to the webhook service; everything else
  # (UI, REST API, and /webhook-test/* which needs the editor) stays on the mains
  WebhookListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref ElasticLoadBalancingV2Listener2
      Priority: 10
      Conditions:
        - Field: path-pattern
          PathPatternConfig:
            Values:
              - /webhook/*
              - /webhook-waiting/*
              - /form/*
              - /form-waiting/*
      Actions:
        - Order: 1
          Type: forward
          TargetGroupArn: !Ref WebhookTargetGroup

  # create A record in hosted zone
  N8nHostRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      Name: !Ref N8nHostRecordName
      HostedZoneId: !Ref N8nHostedZone
      Type: A
      AliasTarget:
        DNSName: !GetAtt ElasticLoadBalancingV2LoadBalancer.DNSName
        HostedZoneId: !GetAtt ElasticLoadBalancingV2LoadBalancer.CanonicalHostedZoneID
        EvaluateTargetHealth: false

  # create s3 bucket for binary data
  S3BinaryBucket:
    Type: AWS::S3::Bucket
    Properties:
      VersioningConfiguration:
        Status: Enabled
      # BucketName intentionally omitted: CloudFormation auto-generates a
      # globally-unique, length-safe, lowercase name. An explicit name like
      # "${AWS::StackName}-n8n-bin" collides in S3's global namespace, can
      # exceed the 63-char limit, and breaks on uppercase stack names.
      # Everything references the bucket via !Ref S3BinaryBucket.
  
  # directly attach bucket policy
  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3BinaryBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowS3UserFullAccess
            Effect: Allow
            Principal:
              AWS: !GetAtt N8nTaskRole.Arn
            Action:
              - "s3:GetBucketLocation"
              - "s3:ListBucket"
            Resource: !Sub "arn:aws:s3:::${S3BinaryBucket}"
          - Sid: AllowS3UserFullAccessToObjects
            Effect: Allow
            Principal:
              AWS: !GetAtt N8nTaskRole.Arn
            Action:
              - "s3:PutObject"
              - "s3:GetObject"
              - "s3:DeleteObject"
            Resource: !Sub "arn:aws:s3:::${S3BinaryBucket}/*"

  # add vpc gateway endpoint for s3
  S3GatewayEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.s3"
      RouteTableIds:
        - !Ref PrivateRouteTableAz1
        - !Ref PrivateRouteTableAz2
      VpcEndpointType: Gateway

  # security groups and subnet group for postgres
  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub "${AWS::StackName}-rds-sg"
      GroupDescription: Allow PostgreSQL access to RDS on 5432
      VpcId: !Ref VPC
  
  # separate security group ingresses for workers and mains to prevent circular reference
  RDSSecGroupIngressMain:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref RDSSecurityGroup
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      SourceSecurityGroupId: !Ref TaskSecGroupMain
  
  RDSSecGroupIngressWorker:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref RDSSecurityGroup
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      SourceSecurityGroupId: !Ref TaskSecGroupWorker

  # subnet group for RDS
  RDSSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupName: !Sub "${AWS::StackName}-pg-db-subnets"
      DBSubnetGroupDescription: Subnet group for RDS Postgres
      SubnetIds: [!Ref PrivateSubnet1, !Ref PrivateSubnet2, !Ref PrivateSubnet3]

  # launch postgresdb instance
  PostgresDB:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Metadata:
      cfn-lint:
        config:
          # MasterUserPassword is a user-supplied stack parameter by design (see
          # the deployment guide). Suppressing the "use dynamic references" hint.
          ignore_checks:
            - W1011
    Properties:
      Engine: postgres
      EngineVersion: "16.9"
      DBInstanceClass: !Ref DBInstanceClass
      DBInstanceIdentifier: !Sub "${AWS::StackName}-pg-db"
      AllocatedStorage: !Ref DBAllocatedStorage
      StorageType: gp3
      StorageEncrypted: true
      PubliclyAccessible: false
      MultiAZ: true
      AutoMinorVersionUpgrade: true
      BackupRetentionPeriod: 15
      Port: 5432
      MasterUsername: !Ref MasterUsername
      MasterUserPassword: !Ref MasterUserPassword
      DBName: !Ref DBName
      VPCSecurityGroups:
        - !GetAtt RDSSecurityGroup.GroupId
      DBSubnetGroupName: !Ref RDSSubnetGroup
      DeletionProtection: false
      EnablePerformanceInsights: false
      CopyTagsToSnapshot: true


  # create secrets file for n8n to connect to RDS
  RDSSecrets:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${AWS::StackName}-app-user/dbcredentials"
      Description: Credentials for n8n to connect to postgres
      SecretString: !Sub |
        {
          "user": "${MasterUsername}",
          "password": "${MasterUserPassword}",
          "host": "${PostgresDB.Endpoint.Address}",
          "port": "5432",
          "database": "${DBName}"
        }  

  # create subnet group for elasticache
  CacheSubnetGroup:
    Type: AWS::ElastiCache::SubnetGroup
    Properties:
      Description: Subnet group for Redis
      SubnetIds: [!Ref PrivateSubnet1, !Ref PrivateSubnet2, !Ref PrivateSubnet3]
      CacheSubnetGroupName: !Sub ${AWS::StackName}-subnets

  # create security group for elasticache
  CacheSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow Redis (TCP 6379) from the app SG
      VpcId: !Ref VPC

  # separate security group ingresses for workers and mains
  CacheSecGroupIngressMain:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref CacheSecurityGroup
      IpProtocol: tcp
      FromPort: 6379
      ToPort: 6379
      SourceSecurityGroupId: !Ref TaskSecGroupMain

  CacheSecGroupIngressWorker:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref CacheSecurityGroup
      IpProtocol: tcp
      FromPort: 6379
      ToPort: 6379
      SourceSecurityGroupId: !Ref TaskSecGroupWorker

  # create parameter group for elasticache
  RedisParamGroup:
    Type: AWS::ElastiCache::ParameterGroup
    Properties:
      CacheParameterGroupFamily: redis7
      Description: Minimal parameter group (defaults)

  # create password secret for n8n to connect to redis
  RedisPasswordSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${AWS::StackName}-app-user/redispassword"
      Description: Password for n8n to connect to redis
      SecretString: !Ref RedisPassword

  # create elasticache replication group for redis
  Redis:
    Type: AWS::ElastiCache::ReplicationGroup
    Properties:
      ReplicationGroupId: !Sub ${AWS::StackName}-redis
      ReplicationGroupDescription: n8n Redis (queue + cache)
      Engine: redis
      CacheNodeType: !Ref RedisInstanceClass
      NumNodeGroups: 1
      ReplicasPerNodeGroup: !Ref RedisReplicasPerNodeGroup
      MultiAZEnabled: !If [ RedisHA, true, false ]
      AutomaticFailoverEnabled: !If [ RedisHA, true, false ]
      CacheSubnetGroupName: !Ref CacheSubnetGroup
      SecurityGroupIds: [ !Ref CacheSecurityGroup ]
      CacheParameterGroupName: !Ref RedisParamGroup
      AuthToken: !Sub "{{resolve:secretsmanager:${RedisPasswordSecret}}}" 
      AtRestEncryptionEnabled: true
      TransitEncryptionEnabled: true
      Port: 6379




  # create fargate cluster
  ECSCluster:
    Type: "AWS::ECS::Cluster"
    DependsOn:
      - RDSSubnetGroup
      - RDSSecurityGroup
      - PostgresDB
      - S3BinaryBucket
    Properties:
        ClusterName: !Sub "${AWS::StackName}-cluster"
        CapacityProviders: 
          - "FARGATE"
          - "FARGATE_SPOT"

# security group for n8n main tasks
  TaskSecGroupMain:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !Ref VPC
      GroupDescription: "Allow only the ALB to reach tasks on 5678"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5678
          ToPort: 5678
          SourceSecurityGroupId: !Ref ALBSecGroup
      SecurityGroupEgress:
        # postgres
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          DestinationSecurityGroupId: !Ref RDSSecurityGroup
        # redis
        - IpProtocol: tcp
          FromPort: 6379
          ToPort: 6379
          DestinationSecurityGroupId: !Ref CacheSecurityGroup
        # for fetching certs
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0

# security group for n8n worker tasks
  TaskSecGroupWorker:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !Ref VPC
      GroupDescription: "Do not allow ALB to reach workers"
      SecurityGroupEgress:
        # postgres
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          DestinationSecurityGroupId: !Ref RDSSecurityGroup
        # redis
        - IpProtocol: tcp
          FromPort: 6379
          ToPort: 6379
          DestinationSecurityGroupId: !Ref CacheSecurityGroup
        # for rds cert fetching
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0

  # create log group for n8n in cloudwatch logs
  N8nLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/${AWS::StackName}
      RetentionInDays: 7
      
  # ECS Task Role (shared by workers and mains)
  # in-line policy grants access to s3
  N8nTaskRole:
    Type: AWS::IAM::Role
    DependsOn:
      - RDSSubnetGroup
      - RDSSecurityGroup
      - PostgresDB
    Properties:
      RoleName: !Sub "${AWS::StackName}-task-role"
      Path: /
      MaxSessionDuration: 3600
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: inline-s3-for-task-role
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: BucketAccess
                Effect: Allow
                Action:
                  - "s3:GetBucketLocation"
                  - "s3:ListBucket"
                Resource:
                  - !Sub "arn:aws:s3:::${S3BinaryBucket}"
              - Sid: ObjectAccess
                Effect: Allow
                Action:
                  - "s3:PutObject"
                  - "s3:GetObject"
                  - "s3:DeleteObject"
                Resource:
                  - !Sub "arn:aws:s3:::${S3BinaryBucket}/*"


  # ECS Task Execution Role
  N8nTaskExecutionRole:
    Type: AWS::IAM::Role
    DependsOn:
      - RDSSubnetGroup
      - RDSSecurityGroup
      - PostgresDB
      - RedisPasswordSecret
    Properties:
      RoleName: !Sub "${AWS::StackName}-task-execution-role"
      Path: /
      MaxSessionDuration: 3600
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        # grant access to secrets for db etc.
        - PolicyName: secrets-access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                Resource:
                  - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AWS::StackName}-app-user/dbcredentials*"                  
                  - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AWS::StackName}-app-user/n8nlicense*" 
                  - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AWS::StackName}-app-user/redispassword*"
                  - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AWS::StackName}-app-user/encryptionkey*"
        # grant access to services to write logs to cloudwatch
        - PolicyName: cloudwatch-write-logs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Sid: "WriteToN8nLogGroup"
                Action:
                  - "logs:CreateLogStream"
                  - "logs:PutLogEvents"
                Resource: 
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/ecs/${AWS::StackName}"
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/ecs/${AWS::StackName}:*"                  
  # Task Definition for n8n main
  N8nMainTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    DependsOn:
      - RDSSubnetGroup
      - RDSSecurityGroup
      - PostgresDB
      - RDSSecrets
      - N8nLicenseSecret
    Properties:
      Family: n8n-main
      Cpu: "1024"
      Memory: "3072"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      RuntimePlatform:
        CpuArchitecture: X86_64
        OperatingSystemFamily: LINUX
      TaskRoleArn: !GetAtt N8nTaskRole.Arn
      ExecutionRoleArn: !GetAtt N8nTaskExecutionRole.Arn
      Volumes:
        - Name: certs
        - Name: runner-cfg
      ContainerDefinitions:
        - Name: n8n
          Image: n8nio/n8n:2.23.4
          Essential: true
          StopTimeout: 120
          PortMappings:
            - ContainerPort: 5678
              HostPort: 5678
              Protocol: tcp
              Name: n8n-5678-tcp
              AppProtocol: http
          Secrets:
            - Name: N8N_LICENSE_ACTIVATION_KEY
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AWS::StackName}-app-user/n8nlicense:LicenseKey::"
            - Name: N8N_LICENSE_TENANT_ID
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AWS::StackName}-app-user/n8nlicense:TenantId::"
            - Name: N8N_ENCRYPTION_KEY
              ValueFrom: !Ref N8nEncryptionKey
            - Name: DB_POSTGRESDB_HOST
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AWS::StackName}-app-user/dbcredentials:host::"
            - Name: DB_POSTGRESDB_PORT
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AWS::StackName}-app-user/dbcredentials:port::"
            - Name: DB_POSTGRESDB_DATABASE
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AWS::StackName}-app-user/dbcredentials:database::"
            - Name: DB_POSTGRESDB_USER
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AWS::StackName}-app-user/dbcredentials:user::"
            - Name: DB_POSTGRESDB_PASSWORD
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AWS::StackName}-app-user/dbcredentials:password::"
            - Name: QUEUE_BULL_REDIS_PASSWORD
              ValueFrom: !Ref RedisPasswordSecret
          Environment:
            - Name: N8N_HOST
              Value: !Ref N8nHostRecord
            - Name: N8N_PROTOCOL
              Value: https
            - Name: N8N_DEFAULT_BINARY_DATA_MODE
              Value: s3
            - Name: N8N_RUNNERS_ENABLED
              Value: true
            - Name: N8N_METRICS
              Value: true
            - Name: N8N_METRICS_INCLUDE_QUEUE_METRICS
              Value: true
            - Name: N8N_AVAILABLE_BINARY_DATA_MODES
              Value: filesystem,s3
            - Name: N8N_EXTERNAL_STORAGE_S3_AUTH_AUTO_DETECT
              Value: true
            - Name: N8N_SECURE_COOKIE
              Value: true
            - Name: DB_TYPE
              Value: postgresdb
            - Name: DB_POSTGRESDB_SSL_ENABLED
              Value: true
            - Name: NODE_EXTRA_CA_CERTS
              Value: /certs/rds-global-bundle.pem
            - Name: DB_POSTGRESDB_SSL_REJECT_UNAUTHORIZED
              Value: true
            # DB connection tuning for faster RDS failover recovery (n8n + TypeORM; no RDS Proxy)
            - Name: DB_POSTGRESDB_KEEP_ALIVE
              Value: true
            - Name: DB_POSTGRESDB_KEEP_ALIVE_INITIAL_DELAY_MS
              Value: 5000
            - Name: DB_POSTGRESDB_CONNECTION_TIMEOUT
              Value: 10000
            - Name: DB_POSTGRESDB_IDLE_CONNECTION_TIMEOUT
              Value: 10000
            # finish in-flight executions on SIGTERM before exit (scale-in / deploy / task stop)
            - Name: N8N_GRACEFUL_SHUTDOWN_TIMEOUT
              Value: 90
            - Name: N8N_EXTERNAL_STORAGE_S3_HOST
              Value: !Sub "s3.${AWS::Region}.amazonaws.com"
            - Name: N8N_EXTERNAL_STORAGE_S3_BUCKET_NAME
              Value: !Ref S3BinaryBucket
            - Name: N8N_EXTERNAL_STORAGE_S3_BUCKET_REGION
              Value: !Ref AWS::Region
            - Name: EXECUTIONS_MODE
              Value: queue
            - Name: N8N_LOG_LEVEL
              Value: warn
            - Name: N8N_MULTI_MAIN_SETUP_ENABLED
              Value: true
            # production webhooks are served by the dedicated webhook service, not the mains
            - Name: N8N_DISABLE_PRODUCTION_MAIN_PROCESS
              Value: true
            # execution-data pruning (matched to the EKS module); runs on the leader main in queue mode
            - Name: EXECUTIONS_DATA_PRUNE
              Value: true
            - Name: EXECUTIONS_DATA_MAX_AGE
              Value: !Ref ExecutionsDataMaxAge
            - Name: EXECUTIONS_DATA_PRUNE_MAX_COUNT
              Value: !Ref ExecutionsDataMaxCount
            - Name: EXECUTIONS_DATA_HARD_DELETE_BUFFER
              Value: 1
            - Name: EXECUTIONS_DATA_PRUNE_HARD_DELETE_INTERVAL
              Value: 15
            - Name: EXECUTIONS_DATA_PRUNE_SOFT_DELETE_INTERVAL
              Value: 60
            - Name: N8N_CONCURRENCY_PRODUCTION_LIMIT
              Value: !Ref ConcurrencyProductionLimit
            # task runner: external when the Python sidecar is enabled, else internal (JS in-process)
            - Name: N8N_RUNNERS_MODE
              Value: !If [ PythonRunner, external, internal ]
            - Name: N8N_RUNNERS_AUTH_TOKEN
              Value: !Join [ "-", [ "runner", !Select [ 2, !Split [ "/", !Ref "AWS::StackId" ] ] ] ]
            - Name: QUEUE_HEALTH_CHECK_ACTIVE
              Value: true
            - Name: QUEUE_BULL_REDIS_TLS
              Value: true
            - Name: QUEUE_BULL_REDIS_HOST
              Value: !GetAtt Redis.PrimaryEndPoint.Address
            - Name: QUEUE_BULL_REDIS_PORT
              Value: !GetAtt Redis.PrimaryEndPoint.Port
            - Name: QUEUE_BULL_REDIS_USERNAME
              Value: default
            - Name: OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS
              Value: true
            - Name: WEBHOOK_URL
              Value: !Sub "https://${N8nHostRecord}/"

          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Sub /ecs/${AWS::StackName}
              awslogs-region: !Sub ${AWS::Region}
              awslogs-stream-prefix: ecs
          HealthCheck:
            Command:
              - CMD-SHELL
              - curl -fsS http://127.0.0.1:5678/ || wget -qO- http://127.0.0.1:5678/ >/dev/null || exit 1
            Interval: 15
            Timeout: 5
            Retries: 3
            StartPeriod: 90
          DependsOn:
            - ContainerName: rds-cert-fetcher
              Condition: SUCCESS
          MountPoints:
            - SourceVolume: certs
              ContainerPath: /certs
        - Name: rds-cert-fetcher
          Image: public.ecr.aws/amazonlinux/amazonlinux:2023
          Essential: false
          Command:
            - /bin/sh
            - -c
            - >
              set -euo pipefail;
              dnf install -y gawk openssl;
              mkdir -p /certs;
              curl -fsSL --retry 5
              https://truststore.pki.rds.amazonaws.com/global/global-bundle.pem
              -o /certs/rds-global-bundle.pem;
              # (optional) basic sanity check:
              awk 'BEGIN{c=0} /BEGIN CERTIFICATE/{c++} END{ if(c<1){exit 1} }' /certs/rds-global-bundle.pem
          MountPoints:
            - SourceVolume: certs
              ContainerPath: /certs
        # JS + native Python task runner (external mode); present only when EnablePythonTaskRunner=true.
        # The stock n8nio/runners image hardcodes the Python import allowlist empty (env-overrides), so a
        # root init container patches that config onto a shared volume from the PythonStdlibAllow /
        # PythonExternalAllow params, and the runner reads it via N8N_RUNNERS_CONFIG_PATH. BETA.
        - !If
          - PythonRunner
          - Name: runner-config-init
            Image: n8nio/runners:2.23.4
            Essential: false
            User: "0"
            EntryPoint: [ "/opt/runners/task-runner-python/.venv/bin/python", "-c" ]
            Command:
              - "import json,os;c=json.load(open('/etc/n8n-task-runners.json'));[r.setdefault('env-overrides',{}).update({'N8N_RUNNERS_STDLIB_ALLOW':os.environ.get('STDLIB_ALLOW',''),'N8N_RUNNERS_EXTERNAL_ALLOW':os.environ.get('EXTERNAL_ALLOW','')}) for r in c['task-runners'] if r.get('runner-type')=='python'];json.dump(c,open('/runner-cfg/n8n-task-runners.json','w'));print('runner config patched: stdlib=%r external=%r'%(os.environ.get('STDLIB_ALLOW',''),os.environ.get('EXTERNAL_ALLOW','')))"
            Environment:
              - Name: STDLIB_ALLOW
                Value: !Ref PythonStdlibAllow
              - Name: EXTERNAL_ALLOW
                Value: !Ref PythonExternalAllow
            MountPoints:
              - SourceVolume: runner-cfg
                ContainerPath: /runner-cfg
            LogConfiguration:
              LogDriver: awslogs
              Options:
                awslogs-group: !Sub /ecs/${AWS::StackName}
                awslogs-region: !Sub ${AWS::Region}
                awslogs-stream-prefix: ecs
          - !Ref "AWS::NoValue"
        - !If
          - PythonRunner
          - Name: task-runner
            Image: n8nio/runners:2.23.4
            Essential: false
            Command: [ "javascript", "python" ]
            DependsOn:
              - ContainerName: runner-config-init
                Condition: SUCCESS
            Environment:
              - Name: N8N_RUNNERS_TASK_BROKER_URI
                Value: http://127.0.0.1:5679
              - Name: N8N_RUNNERS_AUTH_TOKEN
                Value: !Join [ "-", [ "runner", !Select [ 2, !Split [ "/", !Ref "AWS::StackId" ] ] ] ]
              - Name: N8N_RUNNERS_CONFIG_PATH
                Value: /runner-cfg/n8n-task-runners.json
            MountPoints:
              - SourceVolume: runner-cfg
                ContainerPath: /runner-cfg
            LogConfiguration:
              LogDriver: awslogs
              Options:
                awslogs-group: !Sub /ecs/${AWS::StackName}
                awslogs-region: !Sub ${AWS::Region}
                awslogs-stream-prefix: ecs
          - !Ref "AWS::NoValue"

  # Fargate Service for main
  ECSMainService:
    Type: "AWS::ECS::Service"
    DependsOn:
      - RDSSubnetGroup
      - RDSSecurityGroup
      - PostgresDB
      - Redis
    Properties:
        ServiceName: !Sub "${AWS::StackName}-svc-main"
        Cluster: !GetAtt ECSCluster.Arn
        LoadBalancers: 
          -  
            TargetGroupArn: !Ref HttpAppTargetGroup
            ContainerName: "n8n"
            ContainerPort: 5678
        DesiredCount: 2
        TaskDefinition: !Ref N8nMainTaskDefinition
        DeploymentConfiguration: 
            MaximumPercent: 200
            MinimumHealthyPercent: 100
            DeploymentCircuitBreaker: 
                Enable: true
                Rollback: true
        NetworkConfiguration: 
            AwsvpcConfiguration: 
                AssignPublicIp: "DISABLED"
                SecurityGroups: 
                  - !Ref TaskSecGroupMain
                Subnets: 
                  - !Ref PrivateSubnet1
                  - !Ref PrivateSubnet2
        HealthCheckGracePeriodSeconds: 600
        SchedulingStrategy: "REPLICA"
        DeploymentController: 
            Type: "ECS"
        CapacityProviderStrategy: 
          - 
            CapacityProvider: "FARGATE"
            Weight: 1
            Base: 0
  
  # Task Definition for workers
  N8nWorkerTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    DependsOn:
      - RDSSubnetGroup
      - RDSSecurityGroup
      - PostgresDB
      - N8nLicenseSecret
    Properties:
      Family: n8n-worker
      Cpu: "1024"
      Memory: "3072"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      RuntimePlatform:
        CpuArchitecture: X86_64
        OperatingSystemFamily: LINUX
      TaskRoleArn: !GetAtt N8nTaskRole.Arn
      ExecutionRoleArn: !GetAtt N8nTaskExecutionRole.Arn
      Volumes:
        - Name: certs
        - Name: runner-cfg
      ContainerDefinitions:
        - Name: n8n
          Image: n8nio/n8n:2.23.4
          Essential: true
          StopTimeout: 120
          PortMappings:
            - ContainerPort: 5678
              HostPort: 5678
              Protocol: tcp
              Name: n8n-5678-tcp
              AppProtocol: http
          EntryPoint:
            - "node"
            - "/usr/local/bin/n8n"
            - "worker"
          Secrets:
            - Name: N8N_LICENSE_ACTIVATION_KEY
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AWS::StackName}-app-user/n8nlicense:LicenseKey::"
            - Name: N8N_LICENSE_TENANT_ID
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AWS::StackName}-app-user/n8nlicense:TenantId::"
            - Name: N8N_ENCRYPTION_KEY
              ValueFrom: !Ref N8nEncryptionKey
            - Name: DB_POSTGRESDB_HOST
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AWS::StackName}-app-user/dbcredentials:host::"
            - Name: DB_POSTGRESDB_PORT
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AWS::StackName}-app-user/dbcredentials:port::"
            - Name: DB_POSTGRESDB_DATABASE
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AWS::StackName}-app-user/dbcredentials:database::"
            - Name: DB_POSTGRESDB_USER
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AWS::StackName}-app-user/dbcredentials:user::"
            - Name: DB_POSTGRESDB_PASSWORD
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AWS::StackName}-app-user/dbcredentials:password::"
            - Name: QUEUE_BULL_REDIS_PASSWORD
              ValueFrom: !Ref RedisPasswordSecret               
          Environment:
            - Name: N8N_HOST
              Value: !Ref N8nHostRecord
            - Name: N8N_PORT
              Value: 0
            - Name: N8N_PROTOCOL
              Value: https
            - Name: N8N_MODE
              Value: worker
            - Name: N8N_DEFAULT_BINARY_DATA_MODE
              Value: s3
            - Name: N8N_RUNNERS_ENABLED
              Value: true
            - Name: N8N_METRICS
              Value: true
            - Name: N8N_METRICS_INCLUDE_QUEUE_METRICS
              Value: true
            - Name: N8N_AVAILABLE_BINARY_DATA_MODES
              Value: filesystem,s3
            - Name: N8N_EXTERNAL_STORAGE_S3_AUTH_AUTO_DETECT
              Value: true
            - Name: N8N_SECURE_COOKIE
              Value: true
            - Name: DB_TYPE
              Value: postgresdb
            - Name: DB_POSTGRESDB_SSL_ENABLED
              Value: true
            - Name: NODE_EXTRA_CA_CERTS
              Value: /certs/rds-global-bundle.pem
            - Name: DB_POSTGRESDB_SSL_REJECT_UNAUTHORIZED
              Value: true
            # DB connection tuning for faster RDS failover recovery (n8n + TypeORM; no RDS Proxy)
            - Name: DB_POSTGRESDB_KEEP_ALIVE
              Value: true
            - Name: DB_POSTGRESDB_KEEP_ALIVE_INITIAL_DELAY_MS
              Value: 5000
            - Name: DB_POSTGRESDB_CONNECTION_TIMEOUT
              Value: 10000
            - Name: DB_POSTGRESDB_IDLE_CONNECTION_TIMEOUT
              Value: 10000
            # finish in-flight executions on SIGTERM before exit (scale-in / deploy / task stop)
            - Name: N8N_GRACEFUL_SHUTDOWN_TIMEOUT
              Value: 90
            - Name: N8N_EXTERNAL_STORAGE_S3_HOST
              Value: !Sub "s3.${AWS::Region}.amazonaws.com"
            - Name: N8N_EXTERNAL_STORAGE_S3_BUCKET_NAME
              Value: !Ref S3BinaryBucket
            - Name: N8N_EXTERNAL_STORAGE_S3_BUCKET_REGION
              Value: !Ref AWS::Region
            - Name: EXECUTIONS_MODE
              Value: queue
            - Name: N8N_CONCURRENCY
              Value: !Ref WorkerConcurrency
            # task runner: external when the Python sidecar is enabled, else internal (JS in-process)
            - Name: N8N_RUNNERS_MODE
              Value: !If [ PythonRunner, external, internal ]
            - Name: N8N_RUNNERS_AUTH_TOKEN
              Value: !Join [ "-", [ "runner", !Select [ 2, !Split [ "/", !Ref "AWS::StackId" ] ] ] ]
            - Name: N8N_LOG_LEVEL
              Value: warn
            - Name: N8N_MULTI_MAIN_SETUP_ENABLED
              Value: true
            - Name: OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS
              Value: true
            - Name: QUEUE_HEALTH_CHECK_ACTIVE
              Value: true
            - Name: QUEUE_BULL_REDIS_TLS
              Value: true
            - Name: QUEUE_BULL_REDIS_HOST
              Value: !GetAtt Redis.PrimaryEndPoint.Address
            - Name: QUEUE_BULL_REDIS_PORT
              Value: !GetAtt Redis.PrimaryEndPoint.Port  
            - Name: QUEUE_BULL_REDIS_USERNAME
              Value: default              
            - Name: WEBHOOK_URL
              Value: !Sub "https://${N8nHostRecord}/"

          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Sub /ecs/${AWS::StackName}
              awslogs-region: !Sub ${AWS::Region}
              awslogs-stream-prefix: ecs
          HealthCheck:
            Command:
              - CMD-SHELL
              - echo ok
            Timeout: 15
            Retries: 3
            StartPeriod: 90
          DependsOn:
            - ContainerName: rds-cert-fetcher
              Condition: SUCCESS
          MountPoints:
            - SourceVolume: certs
              ContainerPath: /certs
        - Name: rds-cert-fetcher
          Image: public.ecr.aws/amazonlinux/amazonlinux:2023
          Essential: false
          Command:
            - /bin/sh
            - -c
            - >
              set -euo pipefail;
              dnf install -y gawk openssl;
              mkdir -p /certs;
              curl -fsSL --retry 5
              https://truststore.pki.rds.amazonaws.com/global/global-bundle.pem
              -o /certs/rds-global-bundle.pem;
              # (optional) basic sanity check:
              awk 'BEGIN{c=0} /BEGIN CERTIFICATE/{c++} END{ if(c<1){exit 1} }' /certs/rds-global-bundle.pem
          MountPoints:
            - SourceVolume: certs
              ContainerPath: /certs
        # JS + native Python task runner (external mode); present only when EnablePythonTaskRunner=true.
        # The stock n8nio/runners image hardcodes the Python import allowlist empty (env-overrides), so a
        # root init container patches that config onto a shared volume from the PythonStdlibAllow /
        # PythonExternalAllow params, and the runner reads it via N8N_RUNNERS_CONFIG_PATH. BETA.
        - !If
          - PythonRunner
          - Name: runner-config-init
            Image: n8nio/runners:2.23.4
            Essential: false
            User: "0"
            EntryPoint: [ "/opt/runners/task-runner-python/.venv/bin/python", "-c" ]
            Command:
              - "import json,os;c=json.load(open('/etc/n8n-task-runners.json'));[r.setdefault('env-overrides',{}).update({'N8N_RUNNERS_STDLIB_ALLOW':os.environ.get('STDLIB_ALLOW',''),'N8N_RUNNERS_EXTERNAL_ALLOW':os.environ.get('EXTERNAL_ALLOW','')}) for r in c['task-runners'] if r.get('runner-type')=='python'];json.dump(c,open('/runner-cfg/n8n-task-runners.json','w'));print('runner config patched: stdlib=%r external=%r'%(os.environ.get('STDLIB_ALLOW',''),os.environ.get('EXTERNAL_ALLOW','')))"
            Environment:
              - Name: STDLIB_ALLOW
                Value: !Ref PythonStdlibAllow
              - Name: EXTERNAL_ALLOW
                Value: !Ref PythonExternalAllow
            MountPoints:
              - SourceVolume: runner-cfg
                ContainerPath: /runner-cfg
            LogConfiguration:
              LogDriver: awslogs
              Options:
                awslogs-group: !Sub /ecs/${AWS::StackName}
                awslogs-region: !Sub ${AWS::Region}
                awslogs-stream-prefix: ecs
          - !Ref "AWS::NoValue"
        - !If
          - PythonRunner
          - Name: task-runner
            Image: n8nio/runners:2.23.4
            Essential: false
            Command: [ "javascript", "python" ]
            DependsOn:
              - ContainerName: runner-config-init
                Condition: SUCCESS
            Environment:
              - Name: N8N_RUNNERS_TASK_BROKER_URI
                Value: http://127.0.0.1:5679
              - Name: N8N_RUNNERS_AUTH_TOKEN
                Value: !Join [ "-", [ "runner", !Select [ 2, !Split [ "/", !Ref "AWS::StackId" ] ] ] ]
              - Name: N8N_RUNNERS_CONFIG_PATH
                Value: /runner-cfg/n8n-task-runners.json
            MountPoints:
              - SourceVolume: runner-cfg
                ContainerPath: /runner-cfg
            LogConfiguration:
              LogDriver: awslogs
              Options:
                awslogs-group: !Sub /ecs/${AWS::StackName}
                awslogs-region: !Sub ${AWS::Region}
                awslogs-stream-prefix: ecs
          - !Ref "AWS::NoValue"

  # Fargate Service for workers
  ECSWorkerService:
    Type: "AWS::ECS::Service"
    DependsOn:
      - RDSSubnetGroup
      - RDSSecurityGroup
      - PostgresDB
      - Redis
    Properties:
        ServiceName: !Sub "${AWS::StackName}-svc-worker"
        Cluster: !GetAtt ECSCluster.Arn
        DesiredCount: !Ref WorkerMinTasks
        TaskDefinition: !Ref N8nWorkerTaskDefinition
        DeploymentConfiguration: 
            MaximumPercent: 200
            MinimumHealthyPercent: 100
            DeploymentCircuitBreaker: 
                Enable: true
                Rollback: true
        NetworkConfiguration: 
            AwsvpcConfiguration: 
                AssignPublicIp: "DISABLED"
                SecurityGroups: 
                  - !Ref TaskSecGroupWorker
                Subnets: 
                  - !Ref PrivateSubnet1
                  - !Ref PrivateSubnet2
                  - !Ref PrivateSubnet3
        HealthCheckGracePeriodSeconds: 600
        SchedulingStrategy: "REPLICA"
        DeploymentController: 
            Type: "ECS"
        CapacityProviderStrategy: 
          - 
            CapacityProvider: "FARGATE"
            Weight: 1
            Base: 0

  # auto scaling for worker service
  ECSServiceScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      ServiceNamespace: ecs
      ScalableDimension: ecs:service:DesiredCount
      ResourceId: !Sub 
        - "service/${ClusterName}/${ServiceName}"
        - { ClusterName: !Ref ECSCluster, ServiceName: !GetAtt ECSWorkerService.Name }
      MinCapacity: !Ref WorkerMinTasks
      MaxCapacity: !Ref WorkerMaxTasks
      RoleARN: !Sub "arn:aws:iam::${AWS::AccountId}:role/aws-service-role/ecs.application-autoscaling.amazonaws.com/AWSServiceRoleForApplicationAutoScaling_ECSService"

  # scaling rules for CPU
  ECSServiceCPUScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub "${AWS::StackName}-cpu-tt"
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref ECSServiceScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        TargetValue: 60
        ScaleInCooldown: 60
        ScaleOutCooldown: 60

  # scaling rules for memory
  ECSServiceMemoryScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub "${AWS::StackName}-mem-tt"
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref ECSServiceScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageMemoryUtilization
        TargetValue: 70
        ScaleInCooldown: 60
        ScaleOutCooldown: 60

  # ── Queue-depth based worker autoscaling (ECS equivalent of the EKS module's KEDA) ──
  # A scheduled Lambda reads the Bull queue length (LLEN bull:default:wait) from Redis
  # and publishes a CloudWatch "backlog per worker" metric. A target-tracking policy
  # holds that at WorkerBacklogPerTask, so worker count tracks queue demand, not CPU.

  WorkerScalerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "n8n worker-autoscaler Lambda (reaches Redis 6379)"
      VpcId: !Ref VPC

  CacheSecGroupIngressScaler:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref CacheSecurityGroup
      IpProtocol: tcp
      FromPort: 6379
      ToPort: 6379
      SourceSecurityGroupId: !Ref WorkerScalerSecurityGroup

  WorkerScalerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-worker-scaler-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Policies:
        - PolicyName: worker-scaler-inline
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [ "secretsmanager:GetSecretValue" ]
                Resource: !Ref RedisPasswordSecret
              - Effect: Allow
                Action: [ "ecs:DescribeServices" ]
                Resource: "*"
              - Effect: Allow
                Action: [ "cloudwatch:PutMetricData" ]
                Resource: "*"

  WorkerScalerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-worker-scaler"
      Runtime: python3.12
      Handler: index.handler
      Timeout: 30
      Role: !GetAtt WorkerScalerRole.Arn
      VpcConfig:
        SecurityGroupIds: [ !Ref WorkerScalerSecurityGroup ]
        SubnetIds: [ !Ref PrivateSubnet1, !Ref PrivateSubnet2 ]
      Environment:
        Variables:
          REDIS_HOST: !GetAtt Redis.PrimaryEndPoint.Address
          REDIS_PORT: !GetAtt Redis.PrimaryEndPoint.Port
          REDIS_SECRET_ARN: !Ref RedisPasswordSecret
          CLUSTER_NAME: !Sub "${AWS::StackName}-cluster"
          WORKER_SERVICE: !Sub "${AWS::StackName}-svc-worker"
          METRIC_NAMESPACE: !Sub "n8n/${AWS::StackName}"
      Code:
        ZipFile: |
          import os, ssl, socket, boto3

          cw = boto3.client("cloudwatch")
          ecs = boto3.client("ecs")
          _sm = boto3.client("secretsmanager")
          _token = None

          def _auth_token():
              global _token
              if _token is None:
                  _token = _sm.get_secret_value(SecretId=os.environ["REDIS_SECRET_ARN"])["SecretString"]
              return _token

          def _resp(sock, *args):
              # minimal RESP for AUTH (+OK) and LLEN (:int)
              buf = b"*%d\r\n" % len(args)
              for a in args:
                  a = a.encode() if isinstance(a, str) else a
                  buf += b"$%d\r\n%s\r\n" % (len(a), a)
              sock.sendall(buf)
              data = b""
              while b"\r\n" not in data:
                  chunk = sock.recv(4096)
                  if not chunk:
                      break
                  data += chunk
              line = data.split(b"\r\n", 1)[0]
              if line[:1] == b"-":
                  raise RuntimeError("redis: " + line[1:].decode())
              if line[:1] == b":":
                  return int(line[1:])
              return line[1:].decode()

          def _waiting(host, port, token):
              ctx = ssl.create_default_context()
              raw = socket.create_connection((host, int(port)), timeout=8)
              s = ctx.wrap_socket(raw, server_hostname=host)
              try:
                  _resp(s, "AUTH", token)
                  return int(_resp(s, "LLEN", "bull:default:wait"))
              finally:
                  s.close()

          def handler(event, context):
              waiting = _waiting(os.environ["REDIS_HOST"], os.environ["REDIS_PORT"], _auth_token())
              svc = ecs.describe_services(cluster=os.environ["CLUSTER_NAME"],
                                          services=[os.environ["WORKER_SERVICE"]])["services"][0]
              running = max(svc.get("runningCount", 0), 1)
              per_task = waiting / running
              ns = os.environ["METRIC_NAMESPACE"]
              cw.put_metric_data(Namespace=ns, MetricData=[
                  {"MetricName": "WorkerQueueWaiting", "Value": waiting, "Unit": "Count"},
                  {"MetricName": "WorkerBacklogPerTask", "Value": per_task, "Unit": "Count"},
              ])
              return {"waiting": waiting, "running": running, "per_task": per_task}

  WorkerScalerSchedule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${AWS::StackName}-worker-scaler-rate"
      ScheduleExpression: "rate(1 minute)"
      State: ENABLED
      Targets:
        - Id: worker-scaler
          Arn: !GetAtt WorkerScalerFunction.Arn

  WorkerScalerPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref WorkerScalerFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt WorkerScalerSchedule.Arn

  # target-tracking on the custom backlog-per-task metric (the KEDA-equivalent policy)
  ECSWorkerQueueScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub "${AWS::StackName}-worker-queue-tt"
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref ECSServiceScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: !Ref WorkerBacklogPerTask
        ScaleInCooldown: 120
        ScaleOutCooldown: 30
        CustomizedMetricSpecification:
          MetricName: WorkerBacklogPerTask
          Namespace: !Sub "n8n/${AWS::StackName}"
          Statistic: Average

  # Task Definition for the dedicated webhook service.
  # Identical to the main task definition, except it runs `n8n webhook` and does
  # not take part in multi-main leader election.
  N8nWebhookTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    DependsOn:
      - RDSSubnetGroup
      - RDSSecurityGroup
      - PostgresDB
      - RDSSecrets
      - N8nLicenseSecret
    Properties:
      Family: n8n-webhook
      Cpu: "1024"
      Memory: "3072"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      RuntimePlatform:
        CpuArchitecture: X86_64
        OperatingSystemFamily: LINUX
      TaskRoleArn: !GetAtt N8nTaskRole.Arn
      ExecutionRoleArn: !GetAtt N8nTaskExecutionRole.Arn
      Volumes:
        - Name: certs
        - Name: runner-cfg
      ContainerDefinitions:
        - Name: n8n
          Image: n8nio/n8n:2.23.4
          Essential: true
          StopTimeout: 120
          EntryPoint:
            - "node"
            - "/usr/local/bin/n8n"
            - "webhook"
          PortMappings:
            - ContainerPort: 5678
              HostPort: 5678
              Protocol: tcp
              Name: n8n-5678-tcp
              AppProtocol: http
          Secrets:
            - Name: N8N_LICENSE_ACTIVATION_KEY
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AWS::StackName}-app-user/n8nlicense:LicenseKey::"
            - Name: N8N_LICENSE_TENANT_ID
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AWS::StackName}-app-user/n8nlicense:TenantId::"
            - Name: N8N_ENCRYPTION_KEY
              ValueFrom: !Ref N8nEncryptionKey
            - Name: DB_POSTGRESDB_HOST
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AWS::StackName}-app-user/dbcredentials:host::"
            - Name: DB_POSTGRESDB_PORT
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AWS::StackName}-app-user/dbcredentials:port::"
            - Name: DB_POSTGRESDB_DATABASE
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AWS::StackName}-app-user/dbcredentials:database::"
            - Name: DB_POSTGRESDB_USER
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AWS::StackName}-app-user/dbcredentials:user::"
            - Name: DB_POSTGRESDB_PASSWORD
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AWS::StackName}-app-user/dbcredentials:password::"
            - Name: QUEUE_BULL_REDIS_PASSWORD
              ValueFrom: !Ref RedisPasswordSecret
          Environment:
            - Name: N8N_HOST
              Value: !Ref N8nHostRecord
            - Name: N8N_PROTOCOL
              Value: https
            - Name: N8N_DEFAULT_BINARY_DATA_MODE
              Value: s3
            - Name: N8N_RUNNERS_ENABLED
              Value: true
            - Name: N8N_METRICS
              Value: true
            - Name: N8N_METRICS_INCLUDE_QUEUE_METRICS
              Value: true
            - Name: N8N_AVAILABLE_BINARY_DATA_MODES
              Value: filesystem,s3
            - Name: N8N_EXTERNAL_STORAGE_S3_AUTH_AUTO_DETECT
              Value: true
            - Name: N8N_SECURE_COOKIE
              Value: true
            - Name: DB_TYPE
              Value: postgresdb
            - Name: DB_POSTGRESDB_SSL_ENABLED
              Value: true
            - Name: NODE_EXTRA_CA_CERTS
              Value: /certs/rds-global-bundle.pem
            - Name: DB_POSTGRESDB_SSL_REJECT_UNAUTHORIZED
              Value: true
            # DB connection tuning for faster RDS failover recovery (n8n + TypeORM; no RDS Proxy)
            - Name: DB_POSTGRESDB_KEEP_ALIVE
              Value: true
            - Name: DB_POSTGRESDB_KEEP_ALIVE_INITIAL_DELAY_MS
              Value: 5000
            - Name: DB_POSTGRESDB_CONNECTION_TIMEOUT
              Value: 10000
            - Name: DB_POSTGRESDB_IDLE_CONNECTION_TIMEOUT
              Value: 10000
            # finish in-flight executions on SIGTERM before exit (scale-in / deploy / task stop)
            - Name: N8N_GRACEFUL_SHUTDOWN_TIMEOUT
              Value: 90
            - Name: N8N_EXTERNAL_STORAGE_S3_HOST
              Value: !Sub "s3.${AWS::Region}.amazonaws.com"
            - Name: N8N_EXTERNAL_STORAGE_S3_BUCKET_NAME
              Value: !Ref S3BinaryBucket
            - Name: N8N_EXTERNAL_STORAGE_S3_BUCKET_REGION
              Value: !Ref AWS::Region
            - Name: EXECUTIONS_MODE
              Value: queue
            - Name: N8N_LOG_LEVEL
              Value: warn
            - Name: QUEUE_HEALTH_CHECK_ACTIVE
              Value: true
            - Name: QUEUE_BULL_REDIS_TLS
              Value: true
            - Name: QUEUE_BULL_REDIS_HOST
              Value: !GetAtt Redis.PrimaryEndPoint.Address
            - Name: QUEUE_BULL_REDIS_PORT
              Value: !GetAtt Redis.PrimaryEndPoint.Port
            - Name: QUEUE_BULL_REDIS_USERNAME
              Value: default
            - Name: WEBHOOK_URL
              Value: !Sub "https://${N8nHostRecord}/"

          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Sub /ecs/${AWS::StackName}
              awslogs-region: !Sub ${AWS::Region}
              awslogs-stream-prefix: ecs
          HealthCheck:
            Command:
              - CMD-SHELL
              - curl -fsS http://127.0.0.1:5678/healthz || wget -qO- http://127.0.0.1:5678/healthz >/dev/null || exit 1
            Interval: 15
            Timeout: 5
            Retries: 3
            StartPeriod: 90
          DependsOn:
            - ContainerName: rds-cert-fetcher
              Condition: SUCCESS
          MountPoints:
            - SourceVolume: certs
              ContainerPath: /certs
        - Name: rds-cert-fetcher
          Image: public.ecr.aws/amazonlinux/amazonlinux:2023
          Essential: false
          Command:
            - /bin/sh
            - -c
            - >
              set -euo pipefail;
              dnf install -y gawk openssl;
              mkdir -p /certs;
              curl -fsSL --retry 5
              https://truststore.pki.rds.amazonaws.com/global/global-bundle.pem
              -o /certs/rds-global-bundle.pem;
              # (optional) basic sanity check:
              awk 'BEGIN{c=0} /BEGIN CERTIFICATE/{c++} END{ if(c<1){exit 1} }' /certs/rds-global-bundle.pem
          MountPoints:
            - SourceVolume: certs
              ContainerPath: /certs

  # Fargate Service for webhook processors. Reuses TaskSecGroupMain, which already
  # permits ALB ingress on 5678 and egress to RDS/Redis (and is allowed by both).
  ECSWebhookService:
    Type: "AWS::ECS::Service"
    DependsOn:
      - RDSSubnetGroup
      - RDSSecurityGroup
      - PostgresDB
      - Redis
      - WebhookListenerRule
    Properties:
        ServiceName: !Sub "${AWS::StackName}-svc-webhook"
        Cluster: !GetAtt ECSCluster.Arn
        LoadBalancers:
          -
            TargetGroupArn: !Ref WebhookTargetGroup
            ContainerName: "n8n"
            ContainerPort: 5678
        DesiredCount: !Ref WebhookMinTasks
        TaskDefinition: !Ref N8nWebhookTaskDefinition
        DeploymentConfiguration:
            MaximumPercent: 200
            MinimumHealthyPercent: 100
            DeploymentCircuitBreaker:
                Enable: true
                Rollback: true
        NetworkConfiguration:
            AwsvpcConfiguration:
                AssignPublicIp: "DISABLED"
                SecurityGroups:
                  - !Ref TaskSecGroupMain
                Subnets:
                  - !Ref PrivateSubnet1
                  - !Ref PrivateSubnet2
        HealthCheckGracePeriodSeconds: 600
        SchedulingStrategy: "REPLICA"
        DeploymentController:
            Type: "ECS"
        CapacityProviderStrategy:
          -
            CapacityProvider: "FARGATE"
            Weight: 1
            Base: 0

  # auto scaling for webhook service
  ECSWebhookScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      ServiceNamespace: ecs
      ScalableDimension: ecs:service:DesiredCount
      ResourceId: !Sub
        - "service/${ClusterName}/${ServiceName}"
        - { ClusterName: !Ref ECSCluster, ServiceName: !GetAtt ECSWebhookService.Name }
      MinCapacity: !Ref WebhookMinTasks
      MaxCapacity: !Ref WebhookMaxTasks
      RoleARN: !Sub "arn:aws:iam::${AWS::AccountId}:role/aws-service-role/ecs.application-autoscaling.amazonaws.com/AWSServiceRoleForApplicationAutoScaling_ECSService"

  ECSWebhookCPUScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub "${AWS::StackName}-wh-cpu-tt"
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref ECSWebhookScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        TargetValue: 60
        ScaleInCooldown: 60
        ScaleOutCooldown: 60

  ECSWebhookMemoryScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub "${AWS::StackName}-wh-mem-tt"
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref ECSWebhookScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageMemoryUtilization
        TargetValue: 70
        ScaleInCooldown: 60
        ScaleOutCooldown: 60

  # PRIMARY webhook policy: scale on ALB request rate per task (more responsive than CPU
  # for an ingestion tier; avoids the CPU-feedback lag seen when webhook is the bottleneck).
  ECSWebhookRequestScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub "${AWS::StackName}-wh-req-tt"
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref ECSWebhookScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ALBRequestCountPerTarget
          ResourceLabel: !Sub "${ElasticLoadBalancingV2LoadBalancer.LoadBalancerFullName}/${WebhookTargetGroup.TargetGroupFullName}"
        TargetValue: !Ref WebhookRequestsPerTask
        ScaleInCooldown: 120
        ScaleOutCooldown: 30

# output useful information to make things easier to read.
Outputs:
  VpcUrl:
    Description: Links to VPC for deploying n8n resources. 
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/vpcconsole/home?region=${AWS::Region}#VpcDetails:VpcId=${VPC}"

  N8nHostname: 
    Description: URL used to access n8n
    Value: !Sub "https://${N8nHostRecord}" 
  
  N8nMainServiceUrl:
    Description: URL to reach n8n main service in ECS
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/ecs/v2/clusters/${ECSCluster}/services/${ECSMainService.Name}/health?region=${AWS::Region}"

  N8nWorkerServiceUrl:
    Description: URL to reach n8n worker service in ECS
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/ecs/v2/clusters/${ECSCluster}/services/${ECSWorkerService.Name}/health?region=${AWS::Region}"

  N8nWebhookServiceUrl:
    Description: URL to reach n8n webhook service in ECS
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/ecs/v2/clusters/${ECSCluster}/services/${ECSWebhookService.Name}/health?region=${AWS::Region}"

  S3BucketUrl:
    Description: Link to S3 bucket used for binary data
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/s3/buckets/${S3BinaryBucket}"

  PostgresDbUrl:
    Description: Link to Postgres DB used for n8n
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/rds/home?region=${AWS::Region}#database:id=${PostgresDB}"
  
  RedisUrl:
    Description: Link to Elasticache used for n8n
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/elasticache/home?region=${AWS::Region}#/redis/${Redis}"
